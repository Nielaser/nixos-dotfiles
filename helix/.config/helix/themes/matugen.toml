# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#cacb77"
"type" = "#cac8a5"
"type.enum.variant" = "#cac8a5"
"constructor" = "#e6e790"

"constant" = "#a4d0be"
"constant.character" = "#a4d0be"
"constant.character.escape" = "#254e40"

"string" = "#cacb77"
"string.regexp" = "#254e40"
"string.special" = "#e6e790"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#c9c7b6", modifiers = ["italic"] }

"variable" = "#e6e3d5"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#cacb77"

"label" = "#e6e790"

"punctuation" = "#c9c7b6"
"punctuation.special" = "#cac8a5"

"keyword" = "#cacb77"
"keyword.control.conditional" = { fg = "#cacb77", modifiers = ["italic"] }

"operator" = "#cac8a5"

"function" = "#cacb77"
"function.macro" = "#484a00"

"tag" = "#cacb77"
"namespace" = { fg = "#cac8a5", modifiers = ["italic"] }

"special" = "#cacb77"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#cacb77"
"markup.heading.3" = "#cac8a5"
"markup.heading.4" = "#a4d0be"
"markup.heading.5" = "#e6e790"
"markup.heading.6" = "#484a00"

"markup.list" = "#cac8a5"
"markup.list.unchecked" = "#c9c7b6"
"markup.list.checked" = "#e6e790"

"markup.bold" = { fg = "#cacb77", modifiers = ["bold"] }
"markup.italic" = { fg = "#cac8a5", modifiers = ["italic"] }

"markup.link.url" = { fg = "#cacb77", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#e6e790"
"markup.link.label" = "#a4d0be"
"markup.raw" = "#bfecd9"
"markup.quote" = "#254e40"

# --- Diff ---

"diff.plus" = "#a4d0be"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#cacb77"

# --- UI Elements ---

"ui.background" = { fg = "#e6e3d5", bg = "none" }

"ui.linenr" = { fg = "#c9c7b6" }
"ui.linenr.selected" = { fg = "#e6e790" }

"ui.statusline" = { fg = "#e6e790", bg = "none" }
"ui.statusline.inactive" = { fg = "#c9c7b6", bg = "none" }
"ui.statusline.normal" = { fg = "#14140c", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#14140c", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#14140c", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#e6e3d5", bg = "none" }
"ui.window" = { fg = "#c9c7b6" }
"ui.help" = { fg = "#c9c7b6", bg = "none" }

"ui.bufferline" = { fg = "#c9c7b6", bg = "none" }
"ui.bufferline.active" = { fg = "#323200", bg = "#cacb77", underline = { color = "#cacb77", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#e6e3d5"
"ui.text.focus" = { fg = "#cacb77", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#c9c7b6" }
"ui.text.directory" = { fg = "#cacb77" }

"ui.virtual" = "#c9c7b6"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#1c1c14"
"ui.virtual.inlay-hint" = { fg = "#c9c7b6", bg = "none" }
"ui.virtual.jump-label" = { fg = "#484a00", modifiers = ["bold"] }

"ui.selection" = { bg = "#48473a" }

"ui.cursor" = { fg = "#14140c", bg = "#e6e790" }
"ui.cursor.primary" = { fg = "#14140c", bg = "#e6e790" }
"ui.cursor.match" = { fg = "#e6e790", modifiers = ["bold"] }

"ui.highlight" = { bg = "#48482d", modifiers = ["bold"] }

"ui.menu" = { fg = "#e6e3d5", bg = "none" }
"ui.menu.selected" = { fg = "#cacb77", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#cac8a5", underline = { color = "#cac8a5", style = "curl" } }
"diagnostic.info" = { fg = "#a4d0be", underline = { color = "#a4d0be", style = "curl" } }
"diagnostic.hint" = { fg = "#254e40", underline = { color = "#254e40", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#a4d0be"
info = "#cacb77"
hint = "#cac8a5"
